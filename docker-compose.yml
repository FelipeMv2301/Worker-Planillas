version: '3.8'

services:
  worker-planillas:
    build: .
    container_name: worker-planillas
    restart: always
    env_file:
      - .env
    # Se añade network_mode: bridge o una red compartida para comunicación entre contenedores
    networks:
      - planillas-network
    ports:
      - "${WORKER_PORT:-8001}:8000"

networks:
  planillas-network:
    name: planillas-network
    driver: bridge
